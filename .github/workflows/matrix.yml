name: python matrix build
on:
    push:
        branches: [main]

jobs:
    python-matrix:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.10","3.11","3.12"]

        steps:
            - name: install python versions
              uses: actions/setup-python@v4
              with:
                python-version: ${{  matrix.python-version  }}
            - name: print python version
              run: python --version


            
        